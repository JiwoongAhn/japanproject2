# ─────────────────────────────────────────────────────────────────────────────
# 01_launch_smoke.yaml — 앱 실행 크래시 감지 (가장 중요한 테스트)
#
# 목적: 앱을 켰을 때 "즉시 죽지 않고" 첫 화면이 정상적으로 뜨는지 검증한다.
#       이번에 겪었던 "앱 켜자마자 죽음"(supabaseUrl is required) 같은
#       시작 크래시를 자동으로 잡아내는 안전망 역할을 한다.
#
# 동작: 앱 데이터를 초기화(clearState)해서 신규 설치와 똑같은 상태로 실행 →
#       첫 화면인 개인정보 동의 화면(プライバシーポリシー)이 떠야 통과.
#       만약 앱이 시작하자마자 죽으면 이 화면을 못 찾아 테스트가 실패한다.
# ─────────────────────────────────────────────────────────────────────────────
appId: com.jiwoongahn.unione
---
# 앱 실행 (clearState: 로그인/저장 데이터 초기화 → 항상 첫 화면부터 시작)
- launchApp:
    clearState: true

# 첫 화면이 뜰 때까지 최대 20초 대기.
# 세션 확인(스플래시) 시간이 있을 수 있어 넉넉히 잡는다.
# 이 텍스트가 보이면 = JS 번들 로드 성공 + supabase createClient 성공 = 크래시 없음.
- extendedWaitUntil:
    visible: "プライバシーポリシー"
    timeout: 20000

# 동의 버튼까지 보이면 화면이 완전히 렌더된 것으로 본다.
- assertVisible: "同意して始める"
