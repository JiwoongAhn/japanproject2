# ─────────────────────────────────────────────────────────────────────────────
# 02_consent_to_school.yaml — 동의 화면 → 학교 선택 화면 진입 검증
#
# 목적: 첫 화면(개인정보 동의)에서 실제로 버튼을 눌러 다음 화면(학교 선택)까지
#       정상 진행되는지 확인한다. 01번이 "켜지는지"라면, 02번은 "넘어가는지".
#
# 주의: 동의 체크박스는 정책 본문을 끝까지 스크롤해야 활성화된다.
#       (PrivacyConsentScreen: scrolledToBottom 조건)
#       그래서 스크롤을 먼저 충분히 내린 뒤 체크 → 시작 버튼을 누른다.
# ─────────────────────────────────────────────────────────────────────────────
appId: com.jiwoongahn.unione
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "プライバシーポリシー"
    timeout: 20000

# 정책 본문을 끝까지 스크롤(끝까지 내려야 동의 체크가 켜짐).
# 여러 번 스와이프해서 바닥까지 도달시킨다.
- repeat:
    times: 6
    commands:
      - swipe:
          direction: UP

# 동의 체크박스 켜기
- tapOn: "上記のプライバシーポリシーに同意します"

# 시작 버튼 누르기
- tapOn: "同意して始める"

# 다음 화면(학교 선택)이 떠야 통과
- extendedWaitUntil:
    visible: "大学を選んでください"
    timeout: 15000
